<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suivi ICAD — L'Arche de Mallo</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="config.js"></script>
<style>
:root {
    --cream: #faf7f2; --warm: #f0e8d8; --brown: #3d2b1f;
    --orange: #c96b2a; --orange-light: #e8843a; --grey: #8a7968;
    --white: #ffffff; --green: #2e7d32; --green-light: #e8f5e9;
    --amber: #e65100; --amber-light: #fff3e0;
    --blue: #1565c0; --blue-light: #e3f2fd;
    --shadow: 0 4px 24px rgba(61,43,31,0.10);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',sans-serif; background:var(--cream); color:var(--brown); min-height:100vh; }

/* HEADER */
header {
    background:var(--white); border-bottom:3px solid var(--orange);
    padding:20px 32px; display:flex; align-items:center; gap:20px;
    position:sticky; top:0; z-index:100; box-shadow:0 2px 12px rgba(61,43,31,0.08);
}
.logo-header { width:60px; height:60px; object-fit:contain; }
.header-text h1 { font-family:'Playfair Display',serif; font-size:20pt; color:var(--brown); }
.header-text p { font-size:13pt; color:var(--grey); font-weight:300; }
.header-right { margin-left:auto; display:flex; gap:10px; }
.btn-back { background:var(--warm); color:var(--brown); border:none; border-radius:8px; padding:8px 16px; font-size:13px; cursor:pointer; font-family:'DM Sans',sans-serif; text-decoration:none; display:inline-flex; align-items:center; gap:6px; }

/* MAIN */
.main { max-width:1200px; margin:0 auto; padding:24px 20px; }

/* ONGLETS */
.tabs { display:flex; gap:0; border-bottom:2px solid var(--warm); margin-bottom:20px; }
.tab { padding:10px 20px; font-size:14px; font-weight:500; cursor:pointer; border:none; background:transparent; color:var(--grey); border-bottom:2px solid transparent; margin-bottom:-2px; font-family:'DM Sans',sans-serif; transition:all .15s; white-space:nowrap; }
.tab:hover { color:var(--brown); }
.tab.active { color:var(--orange); border-bottom-color:var(--orange); }
.tab .count { display:inline-flex; align-items:center; justify-content:center; min-width:20px; height:18px; padding:0 5px; border-radius:10px; font-size:11px; font-weight:500; margin-left:6px; }
.tab.active .count { background:var(--orange); color:white; }
.tab:not(.active) .count { background:var(--warm); color:var(--grey); }

/* FILTRES */
.filters { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:16px; align-items:center; }
.filter-input { border:1.5px solid var(--warm); border-radius:8px; padding:8px 12px; font-size:13px; font-family:'DM Sans',sans-serif; background:var(--white); color:var(--brown); outline:none; }
.filter-input:focus { border-color:var(--orange); }
.filter-input.large { flex:1; min-width:200px; }
.filter-input.date { width:140px; }
.btn-reset { background:var(--warm); color:var(--grey); border:none; border-radius:8px; padding:8px 14px; font-size:13px; cursor:pointer; font-family:'DM Sans',sans-serif; }

/* STATS */
.stats { display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap; }
.stat { background:var(--white); border-radius:10px; padding:10px 18px; display:flex; align-items:center; gap:10px; box-shadow:0 1px 6px rgba(61,43,31,0.07); }
.stat-num { font-size:22px; font-weight:500; }
.stat-lbl { font-size:12px; color:var(--grey); }
.stat-total .stat-num { color:var(--brown); }
.stat-fait .stat-num { color:var(--green); }
.stat-todo .stat-num { color:var(--amber); }

/* TABLEAU */
.table-wrap { background:var(--white); border-radius:12px; box-shadow:var(--shadow); overflow:hidden; }
table { width:100%; border-collapse:collapse; }
thead tr { background:var(--warm); }
th { padding:10px 12px; text-align:left; font-size:12px; font-weight:500; color:var(--grey); letter-spacing:.03em; white-space:nowrap; }
td { padding:10px 12px; border-bottom:1px solid #f0ebe3; font-size:13px; vertical-align:middle; }
tr:last-child td { border-bottom:none; }
tr:hover td { background:#fdf9f5; }
tr.done-row td { opacity:.75; }

.chat-name { font-weight:500; font-size:14px; }
.badge { display:inline-flex; align-items:center; padding:2px 8px; border-radius:12px; font-size:11px; font-weight:500; margin-left:6px; background:var(--blue-light); color:var(--blue); }
.puce { font-size:11px; color:var(--grey); }

/* COMMENTAIRE INLINE */
.comment-input { border:1px solid #e0d8ce; border-radius:6px; padding:5px 8px; font-size:12px; font-family:'DM Sans',sans-serif; background:var(--cream); color:var(--brown); width:100%; min-width:120px; max-width:180px; resize:none; }
.comment-input:focus { outline:none; border-color:var(--orange); }

/* ICAD ACTION */
.icad-action { display:flex; align-items:center; gap:6px; }
.date-icad { border:1px solid #e0d8ce; border-radius:6px; padding:5px 8px; font-size:12px; font-family:'DM Sans',sans-serif; background:var(--cream); color:var(--brown); width:130px; }
.date-icad:focus { outline:none; border-color:var(--green); }
.btn-ok { background:var(--orange); color:white; border:none; border-radius:6px; padding:6px 12px; font-size:12px; font-weight:500; cursor:pointer; font-family:'DM Sans',sans-serif; white-space:nowrap; }
.btn-ok:hover { background:var(--orange-light); }
.btn-ok:disabled { background:#ccc; cursor:not-allowed; }
.btn-annuler { background:none; border:1px solid var(--grey); color:var(--grey); border-radius:6px; padding:3px 8px; font-size:11px; cursor:pointer; font-family:'DM Sans',sans-serif; white-space:nowrap; margin-left:6px; }
.btn-annuler:hover { background:var(--warm); color:var(--brown); border-color:var(--brown); }

/* STATUT */
.status-done { display:inline-flex; align-items:center; gap:5px; color:var(--green); font-size:13px; font-weight:500; background:var(--green-light); padding:4px 10px; border-radius:8px; }
.status-todo { display:inline-flex; align-items:center; gap:5px; color:var(--amber); font-size:12px; font-weight:500; background:var(--amber-light); padding:4px 10px; border-radius:8px; }

/* BOUTON OUVRIR */
.btn-open { background:var(--white); color:var(--brown); border:1.5px solid #d0c8be; border-radius:6px; padding:5px 12px; font-size:12px; cursor:pointer; font-family:'DM Sans',sans-serif; }
.btn-open:hover { border-color:var(--orange); color:var(--orange); }

/* MODAL DÉTAIL */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(61,43,31,.45); z-index:200; align-items:center; justify-content:center; }
.modal-overlay.open { display:flex; }
.modal { background:var(--white); border-radius:16px; padding:28px; width:90%; max-width:580px; max-height:85vh; overflow-y:auto; box-shadow:0 16px 60px rgba(61,43,31,.25); }
.modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
.modal-title { font-family:'Playfair Display',serif; font-size:18px; color:var(--brown); }
.modal-close { background:var(--warm); border:none; border-radius:8px; width:32px; height:32px; cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center; color:var(--grey); }
.detail-section { margin-bottom:18px; }
.detail-section h3 { font-size:12px; font-weight:500; color:var(--grey); text-transform:uppercase; letter-spacing:.06em; margin-bottom:10px; padding-bottom:6px; border-bottom:1px solid var(--warm); }
.detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px 16px; }
.detail-field { padding:4px 0; }
.detail-lbl { font-size:11px; color:var(--grey); margin-bottom:1px; }
.detail-val { font-size:13px; color:var(--brown); font-weight:400; }
.detail-val.empty { color:#ccc; font-style:italic; }
.icad-status-modal { padding:12px 16px; border-radius:10px; margin-top:8px; }
.icad-status-modal.done { background:var(--green-light); }
.icad-status-modal.todo { background:var(--amber-light); }
.timeline { display:flex; flex-direction:column; gap:8px; }
.timeline-item { display:flex; gap:10px; align-items:flex-start; }
.timeline-dot { width:8px; height:8px; border-radius:50%; background:var(--orange); margin-top:5px; flex-shrink:0; }
.timeline-content { font-size:12px; color:var(--grey); }
.timeline-content strong { color:var(--brown); font-size:13px; }

/* IMPRESSION */
.print-bar { display:flex; gap:10px; margin-top:16px; flex-wrap:wrap; align-items:center; }
.btn-print { background:var(--brown); color:white; border:none; border-radius:8px; padding:9px 16px; font-size:13px; cursor:pointer; font-family:'DM Sans',sans-serif; display:flex; align-items:center; gap:6px; }
.btn-print:hover { background:#5a3e2e; }
.btn-print-green { background:var(--green); }
.btn-print-green:hover { background:#1b5e20; }
.btn-print-amber { background:var(--amber); }
.btn-print-amber:hover { background:#bf360c; }

/* LOADING */
.loading { text-align:center; padding:40px; color:var(--grey); font-size:14px; }
.empty { text-align:center; padding:40px; color:var(--grey); font-size:14px; font-style:italic; }

@media print {
    header, .tabs, .filters, .stats, .print-bar, .btn-open, .icad-action, .comment-input, .modal-overlay { display:none !important; }
    .table-wrap { box-shadow:none; }
    body { background:white; }
    .print-title { display:block !important; }
    td, th { padding:6px 8px; font-size:11px; }
}
.print-title { display:none; font-family:'Playfair Display',serif; font-size:16px; margin-bottom:12px; }
</style>
</head>
<body>

<header>
    <img src="logo_arche.png" alt="Logo" class="logo-header" onerror="this.style.display='none'">
    <div class="header-text">
        <h1>L'Arche de Mallo</h1>
        <p>Suivi ICAD</p>
    </div>
    <div class="header-right">
        <a href="Index.html" class="btn-back">← Retour</a>
    </div>
</header>

<div class="main">

    <!-- ONGLETS -->
    <div class="tabs">
        <button class="tab active" onclick="changerOnglet('tous')" id="tab-tous">
            Tous <span class="count" id="cnt-tous">0</span>
        </button>
        <button class="tab" onclick="changerOnglet('todo')" id="tab-todo">
            À faire <span class="count" id="cnt-todo">0</span>
        </button>
        <button class="tab" onclick="changerOnglet('fait')" id="tab-fait">
            Fait <span class="count" id="cnt-fait">0</span>
        </button>
    </div>

    <!-- FILTRES -->
    <div class="filters">
        <input type="text" class="filter-input large" id="f-search" placeholder="🔍  Nom du chat, nom adopté, adoptant..." oninput="filtrer()">
        <input type="date" class="filter-input date" id="f-from" onchange="filtrer()" title="Date adoption du...">
        <input type="date" class="filter-input date" id="f-to" onchange="filtrer()" title="Date adoption au...">
        <button class="btn-reset" onclick="resetFiltres()">Réinitialiser</button>
    </div>

    <!-- STATS -->
    <div class="stats">
        <div class="stat stat-total">
            <div><div class="stat-num" id="stat-total">—</div><div class="stat-lbl">Total adoptions</div></div>
        </div>
        <div class="stat stat-fait">
            <div><div class="stat-num" id="stat-fait">—</div><div class="stat-lbl">ICAD transférés</div></div>
        </div>
        <div class="stat stat-todo">
            <div><div class="stat-num" id="stat-todo">—</div><div class="stat-lbl">Restent à faire</div></div>
        </div>
    </div>

    <!-- TABLEAU -->
    <div class="print-title" id="print-title">Suivi ICAD — L'Arche de Mallo</div>
    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Chat / Nom adopté</th>
                    <th>N° puce</th>
                    <th>Adoptant</th>
                    <th>Date adoption</th>
                    <th>Commentaire</th>
                    <th>ICAD</th>
                    <th>Statut</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="tbody">
                <tr><td colspan="8" class="loading">Chargement des données...</td></tr>
            </tbody>
        </table>
    </div>

</div><!-- /main -->

<!-- MODAL DÉTAIL -->
<div class="modal-overlay" id="modal-overlay" onclick="fermerModal(event)">
    <div class="modal" id="modal-content">
        <div class="modal-header">
            <div class="modal-title" id="modal-title">Détail</div>
            <button class="modal-close" onclick="fermerModal()">✕</button>
        </div>
        <div id="modal-body"></div>
    </div>
</div>

<script>
// ============================================================
// CONFIG — APPS_SCRIPT_URL est déjà déclaré par config.js
// (ne pas le redéclarer ici avec const, sinon SyntaxError
// "already been declared", les <script> classiques partagent
// le même scope lexical au niveau racine du document)
// ============================================================

// ============================================================
// ÉTAT
// ============================================================
let toutesLignes  = [];   // données brutes depuis le sheet Adoption
let lignesFiltres = [];   // après filtres + onglet
let ongletActif   = 'tous';
// Stockage local ICAD (commentaire + date + statut)
// Clé : puce || (nom+prenom+date)
const STORAGE_KEY = 'icad_suivi_v1';

function chargerICAD() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch(e) { return {}; }
}
function sauverICAD(map) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(map));
}

function cleICAD(ligne) {
    return (ligne.puce || (ligne.nom + '_' + ligne.prenom + '_' + ligne.dateAdoption)).replace(/\s+/g,'_');
}

// ============================================================
// SYNCHRONISATION ICAD DEPUIS LE GOOGLE SHEET
// (source de vérité — permet de retrouver les statuts sur
// n'importe quel PC, pas seulement celui où la validation a été faite)
// ============================================================
async function chargerICADDepuisSheet() {
    try {
        const url = APPS_SCRIPT_URL + '?onglet=ICAD_Suivi';
        const resp = await fetch(url, { mode: 'cors' });
        const json = await resp.json();
        const data = json['ICAD_Suivi'];
        if (!data || !data.headers || !data.rows) return null;

        const h = data.headers;
        const iCle = h.findIndex(x => x.toLowerCase() === 'cle');
        const iDate = h.findIndex(x => x.toLowerCase() === 'datetransfert');
        const iCmt = h.findIndex(x => x.toLowerCase() === 'commentaire');
        if (iCle < 0) return null;

        const map = {};
        data.rows.forEach(row => {
            const cle = row[iCle];
            if (!cle) return;
            map[cle] = {
                statut: 'ok',
                date: iDate >= 0 ? (row[iDate] || '') : '',
                commentaire: iCmt >= 0 ? (row[iCmt] || '') : ''
            };
        });
        return map;
    } catch(e) {
        return null; // hors ligne ou erreur réseau : on gardera le cache local
    }
}

async function synchroniserICAD() {
    const sheetMap = await chargerICADDepuisSheet();
    if (!sheetMap) return; // échec réseau : on garde ce qu'il y a en local
    // Le Sheet est la source de vérité : on remplace le cache local par son contenu
    // (ainsi une suppression faite sur un autre poste se propage bien ici aussi)
    sauverICAD(sheetMap);
}

// ============================================================
// CHARGEMENT DONNÉES depuis Google Sheets (onglet Adoption)
// ============================================================
async function chargerDonnees() {
    try {
        const url = APPS_SCRIPT_URL + '?onglet=Adoption&dateDebut=&dateFin=';
        const resp = await fetch(url, { mode: 'cors' });
        const json = await resp.json();
        const data = json['Adoption'];
        if (!data || !data.headers || !data.rows) throw new Error('Pas de données');

        const h = data.headers;
        const idx = (n) => h.findIndex(x => x.toLowerCase() === n.toLowerCase());

        // Mapping colonnes
        const I = {
            dateAdoption:  idx('dateAdoption'),
            nom:           idx('nom'),
            prenom:        idx('prenom'),
            puce:          idx('puce'),
            nomUsuel:      idx('nomUsuel'),
            nomAdoption:   idx('nomAdoption'),
            couleur:       idx('couleur'),
            sexe:          idx('sexe'),
            dateNaissance: idx('dateNaissance'),
            adresse:       idx('adresse'),
            codePostal:    idx('codePostal'),
            ville:         idx('ville'),
            portable:      idx('portable'),
            email:         idx('email'),
            check_paiement:idx('check_paiement'),
            totalParticipation: idx('totalParticipation'),
            dateVaccin:    idx('dateVaccin'),
            dateRappel:    idx('dateRappel'),
        };

        toutesLignes = data.rows.map(row => ({
            dateAdoption:  row[I.dateAdoption]  || '',
            nom:           row[I.nom]           || '',
            prenom:        row[I.prenom]        || '',
            puce:          row[I.puce]          || '',
            nomUsuel:      row[I.nomUsuel]      || '',
            nomAdoption:   row[I.nomAdoption]   || '',
            couleur:       row[I.couleur]       || '',
            sexe:          row[I.sexe]          || '',
            dateNaissance: row[I.dateNaissance] || '',
            adresse:       row[I.adresse]       || '',
            codePostal:    row[I.codePostal]    || '',
            ville:         row[I.ville]         || '',
            portable:      row[I.portable]      || '',
            email:         row[I.email]         || '',
            check_paiement: row[I.check_paiement] || '',
            totalParticipation: row[I.totalParticipation] || '',
            dateVaccin:    row[I.dateVaccin]    || '',
            dateRappel:    row[I.dateRappel]    || '',
            _raw: row,
            _headers: h,
        })).filter(l => l.dateAdoption || l.nomUsuel || l.puce);

    } catch(err) {
        // Données de démonstration si le sheet n'est pas accessible
        toutesLignes = [
            { dateAdoption:'12/03/2026', nom:'Dupont', prenom:'Marie', puce:'250268731012345', nomUsuel:'Caramel', nomAdoption:'Milo', couleur:'Roux', sexe:'Mâle', dateNaissance:'10/01/2026', adresse:'12 rue des lilas', codePostal:'90000', ville:'Belfort', portable:'0612345678', email:'m.dupont@mail.fr', check_paiement:'Chèque', totalParticipation:'120' },
            { dateAdoption:'05/04/2026', nom:'Martin', prenom:'Paul', puce:'250261234567890', nomUsuel:'Luna', nomAdoption:'Lune', couleur:'Gris tigré', sexe:'Femelle', dateNaissance:'15/02/2026', adresse:'3 av du parc', codePostal:'90300', ville:'Valdoie', portable:'0698765432', email:'paul.m@mail.fr', check_paiement:'Espèce', totalParticipation:'80' },
            { dateAdoption:'20/05/2026', nom:'Bernard', prenom:'Jacques', puce:'250269876543210', nomUsuel:'Nuit', nomAdoption:'Oskar', couleur:'Noir', sexe:'Mâle', dateNaissance:'05/03/2026', adresse:'8 rue de la forêt', codePostal:'90400', ville:'Danjoutin', portable:'0623456789', email:'j.bernard@mail.fr', check_paiement:'Virement', totalParticipation:'150' },
        ];
    }
    filtrer();
}

// ============================================================
// FILTRES + RENDU
// ============================================================
function normaliser(s) {
    return String(s || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
}

function filtrer() {
    const terme  = normaliser(document.getElementById('f-search').value);
    const from   = document.getElementById('f-from').value;
    const to     = document.getElementById('f-to').value;
    const icadMap = chargerICAD();

    lignesFiltres = toutesLignes.filter(l => {
        // Filtre onglet
        const cle = cleICAD(l);
        const icad = icadMap[cle];
        const fait = icad && icad.date && icad.statut === 'ok';
        if (ongletActif === 'fait' && !fait) return false;
        if (ongletActif === 'todo' && fait) return false;

        // Filtre texte
        if (terme) {
            const haystack = normaliser(
                l.nomUsuel + ' ' + l.nomAdoption + ' ' + l.nom + ' ' + l.prenom + ' ' + l.puce
            );
            if (!haystack.includes(terme)) return false;
        }

        // Filtre dates
        if (from || to) {
            const d = parseDate(l.dateAdoption);
            if (from && d && d < new Date(from)) return false;
            if (to   && d && d > new Date(to + 'T23:59:59')) return false;
        }

        return true;
    });

    // Tri par date d'adoption décroissante (la plus récente en premier)
    lignesFiltres.sort((a, b) => {
        const da = parseDate(a.dateAdoption);
        const db = parseDate(b.dateAdoption);
        if (!da && !db) return 0;
        if (!da) return 1;   // pas de date -> relégué en bas
        if (!db) return -1;
        return db - da;
    });

    mettreAJourStats(icadMap);
    rendreLignes(icadMap);
    mettreAJourOnglets(icadMap);
}

function parseDate(str) {
    if (!str) return null;
    const p = str.split('/');
    if (p.length === 3) return new Date(p[2], p[1]-1, p[0]);
    return new Date(str);
}

function mettreAJourStats(icadMap) {
    const total = toutesLignes.length;
    const fait  = toutesLignes.filter(l => {
        const ic = icadMap[cleICAD(l)];
        return ic && ic.date && ic.statut === 'ok';
    }).length;
    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-fait').textContent  = fait;
    document.getElementById('stat-todo').textContent  = total - fait;
}

function mettreAJourOnglets(icadMap) {
    const total = toutesLignes.length;
    const fait  = toutesLignes.filter(l => {
        const ic = icadMap[cleICAD(l)]; return ic && ic.date && ic.statut === 'ok';
    }).length;
    document.getElementById('cnt-tous').textContent = total;
    document.getElementById('cnt-todo').textContent = total - fait;
    document.getElementById('cnt-fait').textContent = fait;
}

function rendreLignes(icadMap) {
    const tbody = document.getElementById('tbody');
    if (!lignesFiltres.length) {
        tbody.innerHTML = '<tr><td colspan="8" class="empty">Aucun résultat</td></tr>';
        return;
    }

    tbody.innerHTML = lignesFiltres.map((l, i) => {
        const cle  = cleICAD(l);
        const icad = icadMap[cle] || {};
        const fait = icad.statut === 'ok' && icad.date;
        const nom  = l.nom + ' ' + l.prenom;
        const puceShort = l.puce ? l.puce.substring(0,8) + '...' : '—';

        const chatCell = `<span class="chat-name">${esc(l.nomUsuel || '—')}</span>${l.nomAdoption ? '<span class="badge">' + esc(l.nomAdoption) + '</span>' : ''}`;

        const commentCell = fait
            ? `<span style="font-size:12px;color:var(--grey);font-style:italic;">${esc(icad.commentaire || '')}</span>`
            : `<textarea class="comment-input" rows="1" id="cmt-${i}" placeholder="Note..." onchange="sauverCommentaire('${cle}', this.value)">${esc(icad.commentaire || '')}</textarea>`;

        const icadCell = fait
            ? '' 
            : `<div class="icad-action">
                <input type="date" class="date-icad" id="date-${i}" value="${icad.dateEnCours || ''}" title="Date du transfert ICAD">
                <button class="btn-ok" onclick="validerICAD('${cle}', ${i})" title="Valider le transfert ICAD">✓ OK</button>
               </div>`;

        const statutCell = fait
            ? `<span class="status-done">✓ ${icad.date}</span> <button class="btn-annuler" onclick="annulerICAD('${cle}')" title="Annuler cette validation ICAD">↩ Annuler</button>`
            : `<span class="status-todo">À faire</span>`;

        const rowClass = fait ? 'done-row' : '';

        return `<tr class="${rowClass}" id="row-${i}">
            <td>${chatCell}</td>
            <td><span class="puce" title="${esc(l.puce)}">${puceShort}</span></td>
            <td>${esc(nom)}</td>
            <td>${esc(l.dateAdoption)}</td>
            <td>${commentCell}</td>
            <td>${icadCell}</td>
            <td>${statutCell}</td>
            <td><button class="btn-open" onclick="ouvrirDetail(${lignesFiltres.indexOf(l)})">Ouvrir</button></td>
        </tr>`;
    }).join('');
}

function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ============================================================
// ICAD — VALIDATION
// ============================================================
function sauverCommentaire(cle, val) {
    const map = chargerICAD();
    if (!map[cle]) map[cle] = {};
    map[cle].commentaire = val;
    sauverICAD(map);

    // Sauvegarde aussi côté Sheet (on garde la date déjà connue, le cas échéant)
    envoyerICAD(cle, map[cle].date || '', val);
}

function validerICAD(cle, idx) {
    const dateInput = document.getElementById('date-' + idx);
    if (!dateInput || !dateInput.value) {
        dateInput && (dateInput.style.border = '1.5px solid var(--amber)');
        dateInput && dateInput.focus();
        alert('Veuillez renseigner la date du transfert ICAD avant de valider.');
        return;
    }
    // Formater date en JJ/MM/AAAA
    const parts = dateInput.value.split('-');
    const dateFR = parts[2] + '/' + parts[1] + '/' + parts[0];

    const cmtEl = document.getElementById('cmt-' + idx);
    const commentaire = cmtEl ? cmtEl.value : '';

    const map = chargerICAD();
    if (!map[cle]) map[cle] = {};
    map[cle].statut = 'ok';
    map[cle].date   = dateFR;
    map[cle].commentaire = commentaire;
    sauverICAD(map);

    // Envoyer à Apps Script pour sauvegarde persistante
    envoyerICAD(cle, dateFR, commentaire);

    filtrer(); // rafraîchir
}

function annulerICAD(cle) {
    if (!confirm('Annuler cette validation ICAD ? Le chat repassera en "À faire".')) return;

    const map = chargerICAD();
    delete map[cle];
    sauverICAD(map);

    // Supprimer aussi la ligne côté Sheet pour que ce soit annulé partout
    supprimerICAD(cle);

    filtrer(); // rafraîchir
}

async function supprimerICAD(cle) {
    try {
        await fetch(APPS_SCRIPT_URL, {
            method: 'POST', mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'icad_delete', cle })
        });
    } catch(e) { /* silencieux */ }
}

async function envoyerICAD(cle, date, commentaire) {
    try {
        await fetch(APPS_SCRIPT_URL, {
            method: 'POST', mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'icad', cle, date, commentaire, onglet: 'ICAD_Suivi' })
        });
    } catch(e) { /* silencieux */ }
}

// ============================================================
// ONGLETS
// ============================================================
function changerOnglet(onglet) {
    ongletActif = onglet;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + onglet).classList.add('active');
    filtrer();
}

// ============================================================
// RÉINITIALISER FILTRES
// ============================================================
function resetFiltres() {
    document.getElementById('f-search').value = '';
    document.getElementById('f-from').value   = '';
    document.getElementById('f-to').value     = '';
    filtrer();
}

                <div class="detail-field"><div class="detail-lbl">Couleur</div><div class="detail-val">${esc(l.couleur) || '<span class="empty">—</span>'}</div></div>
                <div class="detail-field"><div class="detail-lbl">Sexe</div><div class="detail-val">${esc(l.sexe) || '<span class="empty">—</span>'}</div></div>
                <div class="detail-field"><div class="detail-lbl">Né(e) le</div><div class="detail-val">${esc(l.dateNaissance) || '<span class="empty">—</span>'}</div></div>
                <div class="detail-field"><div class="detail-lbl">Date vaccin</div><div class="detail-val">${esc(l.dateVaccin) || '<span class="empty">—</span>'}</div></div>
                <div class="detail-field"><div class="detail-lbl">Date rappel</div><div class="detail-val">${esc(l.dateRappel) || '<span class="empty">—</span>'}</div></div>
            </div>
        </div>

            <h3>Adoptant(e)</h3>
            <div class="detail-grid">
                <div class="detail-field"><div class="detail-lbl">Nom</div><div class="detail-val">${esc(l.nom)} ${esc(l.prenom)}</div></div>
                <div class="detail-field"><div class="detail-lbl">Date adoption</div><div class="detail-val">${esc(l.dateAdoption)}</div></div>
                <div class="detail-field"><div class="detail-lbl">Adresse</div><div class="detail-val">${esc(l.adresse) || '<span class="empty">—</span>'}</div></div>
                <div class="detail-field"><div class="detail-lbl">Code postal / Ville</div><div class="detail-val">${esc(l.codePostal)} ${esc(l.ville)}</div></div>
                <div class="detail-field"><div class="detail-lbl">Téléphone</div><div class="detail-val">${esc(l.portable) || '<span class="empty">—</span>'}</div></div>
                <div class="detail-field"><div class="detail-lbl">Email</div><div class="detail-val">${esc(l.email) || '<span class="empty">—</span>'}</div></div>
                <div class="detail-field"><div class="detail-lbl">Règlement</div><div class="detail-val">${esc(l.check_paiement) || '<span class="empty">—</span>'}</div></div>
                <div class="detail-field"><div class="detail-lbl">Total</div><div class="detail-val">${l.totalParticipation ? esc(l.totalParticipation) + ' €' : '<span class="empty">—</span>'}</div></div>

                    : `<strong style="color:var(--amber)">En attente de transfert</strong>${icad.commentaire ? '<br><span style="font-size:12px;color:var(--grey);margin-top:4px;display:block;">' + esc(icad.commentaire) + '</span>' : ''}`

function fermerModal(e) {
    if (!e || e.target === document.getElementById('modal-overlay')) {
        document.getElementById('modal-overlay').classList.remove('open');
    }
}

// ============================================================
// IMPRESSION
// ============================================================
function imprimer(filtre) {
    const icadMap = chargerICAD();
    const lignes  = toutesLignes.filter(l => {
        const ic   = icadMap[cleICAD(l)];
        const fait = ic && ic.date && ic.statut === 'ok';
        if (filtre === 'fait' && !fait) return false;
        if (filtre === 'todo' && fait)  return false;
        return true;
    });

    let titre = filtre === 'tous' ? 'Liste complète ICAD'
              : filtre === 'fait' ? 'ICAD transférés'
              : 'ICAD à faire';

    const rows = lignes.map(l => {
        const cle  = cleICAD(l);
        const ic   = icadMap[cle] || {};
        const fait = ic.statut === 'ok' && ic.date;
        return `<tr>
            <td>${esc(l.nomUsuel)}${l.nomAdoption ? ' / ' + esc(l.nomAdoption) : ''}</td>
            <td>${esc(l.puce)}</td>
            <td>${esc(l.nom)} ${esc(l.prenom)}</td>
            <td>${esc(l.dateAdoption)}</td>
            <td>${fait ? ic.date : '—'}</td>
            <td>${esc(ic.commentaire || '')}</td>
        </tr>`;
    }).join('');

    const win = window.open('', '_blank');
    win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8">
    <title>${titre}</title>
    <style>
        body{font-family:Arial,sans-serif;font-size:10pt;padding:15mm;}
        h2{font-size:14pt;margin-bottom:4px;}
        .sous{font-size:10pt;color:#666;margin-bottom:12px;}
        table{width:100%;border-collapse:collapse;}
        th{background:#f0e8d8;text-align:left;padding:5px 8px;font-size:9pt;border:0.5px solid #ccc;}
        td{padding:5px 8px;border:0.5px solid #e0d8ce;font-size:9pt;}
        .stat{margin-bottom:8px;font-size:10pt;}
        @page{margin:15mm;}
    </style></head><body>
    <h2>L'Arche de Mallo — ${titre}</h2>
    <div class="sous">Édité le ${new Date().toLocaleDateString('fr-FR')} · ${lignes.length} entrée(s)</div>
    <table>
        <thead><tr><th>Chat / Nom adopté</th><th>N° puce</th><th>Adoptant</th><th>Date adoption</th><th>Date ICAD</th><th>Commentaire</th></tr></thead>
        <tbody>${rows}</tbody>
    </table>
    <script>window.print();<\/script>
    </body></html>`);
    win.document.close();
}

// ============================================================
// INIT
// ============================================================
async function init() {
    await chargerDonnees();     // charge les lignes Adoption (+ 1er affichage)
    await synchroniserICAD();   // récupère le statut ICAD depuis le Sheet (source de vérité)
    filtrer();                  // ré-affiche avec les statuts à jour
}
init();
</script>
